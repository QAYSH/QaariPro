<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QaariPro — Audio Quran Streaming</title>
  <meta name="description"
    content="Listen to the Holy Quran with beautiful recitations from 20 world-renowned Qaris. Stream 114 Surahs verse-by-verse for free." />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕌</text></svg>" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/player.css" />
</head>

<body>
  <div class="app" id="app">

    <!-- ═══════════════ SIDEBAR ═══════════════ -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">☪</div>
        <h1>QaariPro</h1>
      </div>

      <div class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Menu</div>
          <button class="nav-item active" data-route="/">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9,22 9,12 15,12 15,22" />
            </svg>
            Home
          </button>
          <button class="nav-item" data-route="/surahs">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            Browse Surahs
          </button>
          <button class="nav-item" data-route="/reciters">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
            Reciters
          </button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Library</div>
          <button class="nav-item" data-route="/favorites">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            Favorites
          </button>
        </div>

        <!-- Keyboard shortcuts info -->
        <div class="sidebar-section" style="margin-top: auto; padding: 0 12px;">
          <div
            style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 12px; font-size: 11px; color: var(--text-tertiary); line-height: 1.8;">
            <div style="font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;">Keyboard Shortcuts</div>
            <div><kbd style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:10px">Space</kbd>
              Play / Pause</div>
            <div><kbd style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:10px">←</kbd> <kbd
                style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:10px">→</kbd> Prev / Next
              Ayah</div>
            <div><kbd style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:10px">↑</kbd> <kbd
                style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:10px">↓</kbd> Volume</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
    <main class="main-content">
      <!-- Top Header -->
      <div class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>

        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search surahs, reciters..."
            autocomplete="off" />
        </div>

        <div style="width: 40px;"></div>
      </div>

      <!-- Dynamic Content -->
      <div id="content">
        <!-- Pages render here -->
        <div class="loading-container" style="min-height: 60vh">
          <div class="loading-spinner"></div>
          <div class="loading-text">Loading QaariPro...</div>
        </div>
      </div>
    </main>

    <!-- ═══════════════ PLAYER BAR ═══════════════ -->
    <div class="player-bar hidden" id="playerBar">
      <!-- Progress bar across top -->
      <div class="player-progress-container">
        <div class="player-progress-bar" style="width: 0%"></div>
      </div>

      <!-- Left: Now Playing -->
      <div class="player-now-playing">
        <div class="player-cover"></div>
        <div class="player-track-info">
          <div class="player-track-name">—</div>
          <div class="player-track-artist">—</div>
        </div>
        <button class="player-fav-btn" aria-label="Favorite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>
      </div>

      <!-- Center: Controls -->
      <div class="player-controls">
        <div class="player-controls-buttons">
          <button class="player-ctrl-btn player-repeat-btn" id="playerRepeatBtn" aria-label="Repeat"
            style="position:relative">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17,1 21,5 17,9" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <polyline points="7,23 3,19 7,15" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </button>
          <button class="player-ctrl-btn" id="playerPrevBtn" aria-label="Previous Ayah">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19,20 9,12 19,4" />
              <rect x="5" y="4" width="2" height="16" />
            </svg>
          </button>
          <button class="player-play-btn" id="playerPlayBtn" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21" />
            </svg>
          </button>
          <button class="player-ctrl-btn" id="playerNextBtn" aria-label="Next Ayah">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,4 15,12 5,20" />
              <rect x="17" y="4" width="2" height="16" />
            </svg>
          </button>
          <button class="player-ctrl-btn" style="visibility:hidden">
            <!-- Spacer for symmetry -->
          </button>
        </div>
        <div class="player-time">
          <span class="player-time-current">0:00</span>
          <span class="player-ayah-counter"></span>
          <span class="player-time-duration">0:00</span>
        </div>
      </div>

      <!-- Right: Volume & Extras -->
      <div class="player-extra">
        <div class="volume-container">
          <button class="player-extra-btn" id="volumeBtn" aria-label="Volume">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            </svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
        </div>
      </div>
    </div>

  </div>

  <!-- ═══════════════ MOBILE BOTTOM NAV ═══════════════ -->
  <nav class="mobile-bottom-nav" id="mobileBottomNav">
    <div class="mobile-bottom-nav-inner">
      <button class="mobile-nav-btn active" data-route="/" onclick="QaariRouter.navigate('/')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9,22 9,12 15,12 15,22" />
        </svg>
        Home
      </button>
      <button class="mobile-nav-btn" data-route="/surahs" onclick="QaariRouter.navigate('/surahs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        Surahs
      </button>
      <button class="mobile-nav-btn" data-route="/reciters" onclick="QaariRouter.navigate('/reciters')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
        Reciters
      </button>
      <button class="mobile-nav-btn" data-route="/favorites" onclick="QaariRouter.navigate('/favorites')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        Favorites
      </button>
    </div>
  </nav>

  <style>
    /* Reciter avatar image inside the colored circle */
    .reciter-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
  </style>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/router.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
